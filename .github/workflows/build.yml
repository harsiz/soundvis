name: Build SoundVis

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore (always fresh — version is *)
        run: dotnet restore osu.Game.Rulesets.SoundVis/osu.Game.Rulesets.SoundVis.csproj --no-cache

      - name: Print resolved ppy.osu.Game version
        run: dotnet list osu.Game.Rulesets.SoundVis/osu.Game.Rulesets.SoundVis.csproj package | grep ppy.osu.Game

      - name: Build
        run: dotnet build osu.Game.Rulesets.SoundVis/osu.Game.Rulesets.SoundVis.csproj -c Release --no-restore

      - name: Upload DLL
        uses: actions/upload-artifact@v4
        with:
          name: osu.Game.Rulesets.SoundVis
          path: osu.Game.Rulesets.SoundVis/bin/Release/net8.0/osu.Game.Rulesets.SoundVis.dll
          if-no-files-found: error
